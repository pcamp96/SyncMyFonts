name: Cross-Platform Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        if: runner.os != 'Windows'
        run: cargo fmt --check

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Build agent release
        run: cargo build --release -p syncmyfonts-agent --bins

      - name: Verify macOS launcher scripts
        if: runner.os == 'macOS'
        run: |
          sh -n packaging/macos/Start-SyncMyFonts.command
          sh -n packaging/macos/install-launchagent.sh
          sh -n packaging/macos/uninstall-launchagent.sh
          sed -e 's|{{SYNCMYFONTS_RUNNER_PATH}}|/tmp/syncmyfonts-runner.sh|g' \
              -e 's|{{SYNCMYFONTS_LOG_DIR}}|/tmp|g' \
              -e 's|{{SYNCMYFONTS_WORKING_DIR}}|/tmp|g' \
              packaging/macos/com.syncmyfonts.lan-serve.plist.template > /tmp/syncmyfonts-serve.plist
          sed -e 's|{{SYNCMYFONTS_RUNNER_PATH}}|/tmp/syncmyfonts-runner.sh|g' \
              -e 's|{{SYNCMYFONTS_SYNC_INTERVAL_SECONDS}}|14400|g' \
              -e 's|{{SYNCMYFONTS_LOG_DIR}}|/tmp|g' \
              -e 's|{{SYNCMYFONTS_WORKING_DIR}}|/tmp|g' \
              packaging/macos/com.syncmyfonts.lan-sync.plist.template > /tmp/syncmyfonts-sync.plist
          plutil -lint /tmp/syncmyfonts-serve.plist /tmp/syncmyfonts-sync.plist

      - name: Verify PowerShell launcher scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          [System.Management.Automation.PSParser]::Tokenize((Get-Content packaging/windows/install-startup-task.ps1 -Raw), [ref]$null) | Out-Null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content packaging/windows/uninstall-startup-task.ps1 -Raw), [ref]$null) | Out-Null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content packaging/windows/create-startup-shortcut.ps1 -Raw), [ref]$null) | Out-Null
          if (-not (Test-Path packaging/windows/Start-SyncMyFonts.cmd)) { throw "Windows app launcher is missing" }

      - name: Build macOS archive
        if: runner.os == 'macOS'
        run: scripts/release/build-macos.sh

      - name: Smoke macOS archive
        if: runner.os == 'macOS'
        run: |
          set -eu
          archive=$(ls dist/syncmyfonts-macos-*.tar.gz | head -n 1)
          smoke_root=$(mktemp -d)
          tar -C "$smoke_root" -xzf "$archive"
          package_dir=$(find "$smoke_root" -maxdepth 1 -type d -name 'syncmyfonts-macos-*' | head -n 1)
          test -x "$package_dir/bin/syncmyfonts-agent"
          test -x "$package_dir/bin/syncmyfonts-gui"
          test -x "$package_dir/Start-SyncMyFonts.command"
          test -x "$package_dir/SyncMyFonts.app/Contents/MacOS/SyncMyFonts"
          test -x "$package_dir/SyncMyFonts.app/Contents/MacOS/syncmyfonts-agent"
          plutil -lint "$package_dir/SyncMyFonts.app/Contents/Info.plist"
          SYNCMYFONTS_CONFIG_DIR="$smoke_root/config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/logs" \
          SYNCMYFONTS_USER_FONT_DIR="$smoke_root/fonts" \
          "$package_dir/bin/syncmyfonts-agent" diagnostics > "$smoke_root/diagnostics.json"
          grep -q '"support_report_text"' "$smoke_root/diagnostics.json"
          grep -q '"log_dir"' "$smoke_root/diagnostics.json"

      - name: Upload macOS archive
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: syncmyfonts-macos
          path: dist/syncmyfonts-macos-*.tar.gz
          if-no-files-found: error

      - name: Build Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\release\build-windows.ps1

      - name: Smoke Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $archive = Get-ChildItem dist\syncmyfonts-windows-*.zip | Select-Object -First 1
          $smokeRoot = Join-Path $env:RUNNER_TEMP ("syncmyfonts-smoke-" + [guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Force -Path $smokeRoot | Out-Null
          Expand-Archive -Path $archive.FullName -DestinationPath $smokeRoot
          $packageDir = Get-ChildItem $smokeRoot -Directory -Filter "syncmyfonts-windows-*" | Select-Object -First 1
          $agent = Join-Path $packageDir.FullName "bin\syncmyfonts-agent.exe"
          $gui = Join-Path $packageDir.FullName "bin\syncmyfonts-gui.exe"
          $launcher = Join-Path $packageDir.FullName "Start-SyncMyFonts.cmd"
          if (-not (Test-Path $agent)) { throw "Packaged agent missing" }
          if (-not (Test-Path $gui)) { throw "Packaged GUI launcher missing" }
          if (-not (Test-Path $launcher)) { throw "Packaged launcher missing" }
          $env:SYNCMYFONTS_CONFIG_DIR = Join-Path $smokeRoot "config"
          $env:SYNCMYFONTS_LOG_DIR = Join-Path $smokeRoot "logs"
          $env:SYNCMYFONTS_USER_FONT_DIR = Join-Path $smokeRoot "fonts"
          & $agent diagnostics | Tee-Object -FilePath (Join-Path $smokeRoot "diagnostics.json")
          $diagnostics = Get-Content (Join-Path $smokeRoot "diagnostics.json") -Raw
          if (-not $diagnostics.Contains('"support_report_text"')) { throw "Diagnostics support report missing" }
          if (-not $diagnostics.Contains('"log_dir"')) { throw "Diagnostics log dir missing" }

      - name: Upload Windows archive
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: syncmyfonts-windows
          path: dist/syncmyfonts-windows-*.zip
          if-no-files-found: error
