name: Cross-Platform Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        if: runner.os != 'Windows'
        run: cargo fmt --check

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Build agent release
        run: cargo build --release -p syncmyfonts-agent --bins

      - name: Verify macOS launcher scripts
        if: runner.os == 'macOS'
        run: |
          sh -n packaging/macos/Start-SyncMyFonts.command
          sh -n packaging/macos/install-launchagent.sh
          sh -n packaging/macos/uninstall-launchagent.sh
          sed -e 's|{{SYNCMYFONTS_RUNNER_PATH}}|/tmp/syncmyfonts-runner.sh|g' \
              -e 's|{{SYNCMYFONTS_LOG_DIR}}|/tmp|g' \
              -e 's|{{SYNCMYFONTS_WORKING_DIR}}|/tmp|g' \
              packaging/macos/com.syncmyfonts.lan-serve.plist.template > /tmp/syncmyfonts-serve.plist
          sed -e 's|{{SYNCMYFONTS_RUNNER_PATH}}|/tmp/syncmyfonts-runner.sh|g' \
              -e 's|{{SYNCMYFONTS_SYNC_INTERVAL_SECONDS}}|14400|g' \
              -e 's|{{SYNCMYFONTS_LOG_DIR}}|/tmp|g' \
              -e 's|{{SYNCMYFONTS_WORKING_DIR}}|/tmp|g' \
              packaging/macos/com.syncmyfonts.lan-sync.plist.template > /tmp/syncmyfonts-sync.plist
          plutil -lint /tmp/syncmyfonts-serve.plist /tmp/syncmyfonts-sync.plist

      - name: Verify PowerShell launcher scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          [System.Management.Automation.PSParser]::Tokenize((Get-Content packaging/windows/install-startup-task.ps1 -Raw), [ref]$null) | Out-Null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content packaging/windows/uninstall-startup-task.ps1 -Raw), [ref]$null) | Out-Null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content packaging/windows/create-startup-shortcut.ps1 -Raw), [ref]$null) | Out-Null
          if (-not (Test-Path packaging/windows/Start-SyncMyFonts.cmd)) { throw "Windows app launcher is missing" }

      - name: Build macOS archive
        if: runner.os == 'macOS'
        run: scripts/release/build-macos.sh

      - name: Smoke macOS archive
        if: runner.os == 'macOS'
        run: |
          set -eu
          archive=$(ls dist/syncmyfonts-macos-*.tar.gz | head -n 1)
          smoke_root=$(mktemp -d)
          tar -C "$smoke_root" -xzf "$archive"
          package_dir=$(find "$smoke_root" -maxdepth 1 -type d -name 'syncmyfonts-macos-*' | head -n 1)
          test -x "$package_dir/bin/syncmyfonts-agent"
          test -x "$package_dir/bin/syncmyfonts-gui"
          test -x "$package_dir/Start-SyncMyFonts.command"
          test -x "$package_dir/SyncMyFonts.app/Contents/MacOS/SyncMyFonts"
          test -x "$package_dir/SyncMyFonts.app/Contents/MacOS/syncmyfonts-agent"
          plutil -lint "$package_dir/SyncMyFonts.app/Contents/Info.plist"
          plutil -extract CFBundleExecutable raw -o - "$package_dir/SyncMyFonts.app/Contents/Info.plist" | grep -q '^SyncMyFonts$'
          grep -q 'syncmyfonts-gui' "$package_dir/Start-SyncMyFonts.command"
          grep -q 'Install Validation' "$package_dir/START-HERE.txt"
          grep -q 'OFL test font' "$package_dir/START-HERE.txt"
          grep -q "sharing computer's LAN URL" "$package_dir/START-HERE.txt"
          grep -q 'URL field manually' "$package_dir/START-HERE.txt"
          grep -q 'Local Network discovery is denied' "$package_dir/START-HERE.txt"
          SYNCMYFONTS_CONFIG_DIR="$smoke_root/config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/logs" \
          SYNCMYFONTS_USER_FONT_DIR="$smoke_root/fonts" \
          "$package_dir/bin/syncmyfonts-gui" --self-test > "$smoke_root/gui-self-test.json"
          SYNCMYFONTS_CONFIG_DIR="$smoke_root/config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/logs" \
          SYNCMYFONTS_USER_FONT_DIR="$smoke_root/fonts" \
          "$package_dir/bin/syncmyfonts-agent" diagnostics > "$smoke_root/diagnostics.json"
          SYNCMYFONTS_CONFIG_DIR="$smoke_root/config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/logs" \
          SYNCMYFONTS_USER_FONT_DIR="$smoke_root/fonts" \
          SYNCMYFONTS_SKIP_STARTUP_REGISTRATION=1 \
          "$package_dir/bin/syncmyfonts-agent" doctor > "$smoke_root/doctor.json"
          SYNCMYFONTS_CONFIG_DIR="$smoke_root/config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/logs" \
          SYNCMYFONTS_USER_FONT_DIR="$smoke_root/fonts" \
          "$package_dir/bin/syncmyfonts-agent" validation-report > "$smoke_root/validation-report.json"
          SYNCMYFONTS_CONFIG_DIR="$smoke_root/config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/logs" \
          SYNCMYFONTS_USER_FONT_DIR="$smoke_root/fonts" \
          "$package_dir/bin/syncmyfonts-agent" validation-report --write > "$smoke_root/validation-report-file.json"
          SYNCMYFONTS_CONFIG_DIR="$smoke_root/config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/logs" \
          SYNCMYFONTS_USER_FONT_DIR="$smoke_root/fonts" \
          "$package_dir/bin/syncmyfonts-agent" repair-managed > "$smoke_root/repair-managed.json"
          SYNCMYFONTS_CONFIG_DIR="$smoke_root/config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/logs" \
          SYNCMYFONTS_USER_FONT_DIR="$smoke_root/fonts" \
          "$package_dir/bin/syncmyfonts-agent" install-validation-font > "$smoke_root/install-validation-font.json"
          SYNCMYFONTS_CONFIG_DIR="$smoke_root/config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/logs" \
          SYNCMYFONTS_USER_FONT_DIR="$smoke_root/fonts" \
          "$package_dir/bin/syncmyfonts-agent" scan > "$smoke_root/scan-after-validation-font.json"
          grep -q '"support_report_text"' "$smoke_root/diagnostics.json"
          grep -q '"ok": true' "$smoke_root/gui-self-test.json"
          grep -q '"Native GUI state initialized' "$smoke_root/gui-self-test.json"
          python3 - "$smoke_root/gui-self-test.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              gui = json.load(handle)
          assert gui["ok"] is True
          assert gui["platform"] == "macos"
          assert isinstance(gui["first_run_steps"], list)
          assert any("Install Validation Font" in step for step in gui["first_run_steps"])
          assert any("Share Fonts On This Network" in step for step in gui["first_run_steps"])
          assert any("Preview From Peer" in step for step in gui["first_run_steps"])
          assert isinstance(gui["lan_readiness"], list)
          assert any("Sharing: off" in line for line in gui["lan_readiness"])
          assert any("no port forwarding" in line for line in gui["lan_readiness"])
          assert any("Saved peers: none yet" in line for line in gui["lan_readiness"])
          assert any("Automation: available after saving a peer" in line for line in gui["lan_readiness"])
          assert gui["saved_peer_count"] == 0
          assert "Pairing mode" in gui["setup_phase"]
          assert "This computer" in gui["role_card_text"]
          assert "Other computer" in gui["role_card_text"]
          assert "Receiving fonts" in gui["pre_share_guidance"]
          assert "Local Network access" in gui["lan_sharing_guidance"]
          assert "No port forwarding" in gui["lan_sharing_guidance"]
          assert "paste the sharing computer" in gui["manual_peer_fallback_guidance"]
          matrix_names = {direction["name"] for direction in gui["sync_validation_matrix"]}
          assert matrix_names == {"macOS to Windows", "Windows to macOS"}
          assert "SyncMyFonts LAN MVP validation" in gui["validation_checklist_text"]
          assert "system fonts were not offered" in gui["validation_checklist_text"]
          assert gui["message"].startswith("Native GUI state initialized")
          PY
          grep -q '"log_dir"' "$smoke_root/diagnostics.json"
          grep -q '"checks"' "$smoke_root/doctor.json"
          grep -q '"saved-peers"' "$smoke_root/doctor.json"
          grep -q '"registration_issues"' "$smoke_root/validation-report.json"
          grep -q '"manual_validation_steps"' "$smoke_root/validation-report.json"
          grep -q '"sync_validation_matrix"' "$smoke_root/validation-report.json"
          grep -q 'macOS to Windows' "$smoke_root/validation-report.json"
          grep -q 'Windows to macOS' "$smoke_root/validation-report.json"
          grep -q '"pass_criteria"' "$smoke_root/validation-report.json"
          grep -q '"path"' "$smoke_root/validation-report-file.json"
          grep -q '"repaired"' "$smoke_root/repair-managed.json"
          grep -q '"failed"' "$smoke_root/repair-managed.json"
          grep -q '"file_name": "SyncMyFontsValidation-Basic-Regular.ttf"' "$smoke_root/install-validation-font.json"
          grep -q '"SyncMyFontsValidation-Basic-Regular.ttf"' "$smoke_root/scan-after-validation-font.json"
          python3 - "$smoke_root/scan-after-validation-font.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              scan = json.load(handle)
          assert scan["schema"] == 1
          assert scan["platform"] == "macos"
          assert isinstance(scan["fonts"], list)
          assert isinstance(scan["warnings"], list)
          assert any(
              font["file_name"] == "SyncMyFontsValidation-Basic-Regular.ttf"
              and font["format"] in {"ttf", "otf"}
              and font["content_sha256"]
              for font in scan["fonts"]
          )
          PY
          find "$smoke_root/logs" -name 'validation-report-*.json' | grep -q .
          source_fonts="$smoke_root/source-fonts"
          source_config="$smoke_root/source-config"
          target_fonts="$smoke_root/target-fonts"
          target_config="$smoke_root/target-config"
          mkdir -p "$source_fonts" "$source_config" "$target_fonts" "$target_config"
          curl -fsSL "https://raw.githubusercontent.com/google/fonts/main/ofl/basic/Basic-Regular.ttf" -o "$source_fonts/PackagedSmoke.ttf"
          smoke_port=$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')
          SYNCMYFONTS_CONFIG_DIR="$source_config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/source-logs" \
          SYNCMYFONTS_USER_FONT_DIR="$source_fonts" \
          "$package_dir/bin/syncmyfonts-agent" lan-serve --listen "127.0.0.1:$smoke_port" --pairing-code 12345678 &
          server_pid=$!
          trap 'kill "$server_pid" >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:$smoke_port/health" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:$smoke_port/health" >/dev/null
          SYNCMYFONTS_CONFIG_DIR="$target_config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/target-logs" \
          SYNCMYFONTS_USER_FONT_DIR="$target_fonts" \
          "$package_dir/bin/syncmyfonts-agent" lan-pair --name "Packaged Peer" --url "http://127.0.0.1:$smoke_port" --pairing-code 12345678 > "$smoke_root/lan-pair.json"
          grep -q '"has_lan_key"' "$smoke_root/lan-pair.json"
          SYNCMYFONTS_CONFIG_DIR="$target_config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/target-logs" \
          SYNCMYFONTS_USER_FONT_DIR="$target_fonts" \
          "$package_dir/bin/syncmyfonts-agent" lan-sync-all > "$smoke_root/lan-sync.json"
          grep -q '"ok": true' "$smoke_root/lan-sync.json"
          grep -q '"installed"' "$smoke_root/lan-sync.json"
          test -f "$target_fonts/SyncMyFonts/PackagedSmoke.ttf"
          SYNCMYFONTS_CONFIG_DIR="$target_config" \
          SYNCMYFONTS_LOG_DIR="$smoke_root/target-logs" \
          SYNCMYFONTS_USER_FONT_DIR="$target_fonts" \
          "$package_dir/bin/syncmyfonts-agent" verify-managed > "$smoke_root/verify-managed-after-sync.json"
          grep -q '"registration_issues": \[\]' "$smoke_root/verify-managed-after-sync.json"

      - name: Upload macOS archive
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: syncmyfonts-macos
          path: dist/syncmyfonts-macos-*.tar.gz
          if-no-files-found: error

      - name: Build Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\release\build-windows.ps1

      - name: Smoke Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $expectedVersion = ($metadata.packages | Where-Object { $_.name -eq "syncmyfonts-agent" } | Select-Object -First 1).version
          $archive = Get-ChildItem dist\syncmyfonts-windows-*.zip | Select-Object -First 1
          if ($archive.Name -ne "syncmyfonts-windows-$expectedVersion.zip") { throw "Unexpected Windows archive name: $($archive.Name)" }
          $smokeRoot = Join-Path $env:RUNNER_TEMP ("syncmyfonts-smoke-" + [guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Force -Path $smokeRoot | Out-Null
          Expand-Archive -Path $archive.FullName -DestinationPath $smokeRoot
          $packageDir = Get-ChildItem $smokeRoot -Directory -Filter "syncmyfonts-windows-*" | Select-Object -First 1
          if ($packageDir.Name -ne "syncmyfonts-windows-$expectedVersion") { throw "Unexpected Windows package directory name: $($packageDir.Name)" }
          $agent = Join-Path $packageDir.FullName "bin\syncmyfonts-agent.exe"
          $gui = Join-Path $packageDir.FullName "bin\syncmyfonts-gui.exe"
          $launcher = Join-Path $packageDir.FullName "Start-SyncMyFonts.cmd"
          if (-not (Test-Path $agent)) { throw "Packaged agent missing" }
          if (-not (Test-Path $gui)) { throw "Packaged GUI launcher missing" }
          if (-not (Test-Path $launcher)) { throw "Packaged launcher missing" }
          $launcherText = Get-Content $launcher -Raw
          if (-not $launcherText.Contains("syncmyfonts-gui.exe")) { throw "Packaged launcher does not target GUI binary" }
          $startHereText = Get-Content (Join-Path $packageDir.FullName "START-HERE.txt") -Raw
          if (-not $startHereText.Contains("Install Validation") -or -not $startHereText.Contains("OFL test font")) { throw "Packaged START-HERE does not mention the validation font setup" }
          if (-not $startHereText.Contains("paste the sharing computer's LAN URL")) { throw "Packaged START-HERE does not mention manual LAN URL fallback" }
          if (-not $startHereText.Contains("Client-only sync should not need an inbound firewall prompt")) { throw "Packaged START-HERE does not distinguish Windows client-only firewall behavior" }
          $env:SYNCMYFONTS_CONFIG_DIR = Join-Path $smokeRoot "config"
          $env:SYNCMYFONTS_LOG_DIR = Join-Path $smokeRoot "logs"
          $env:SYNCMYFONTS_USER_FONT_DIR = Join-Path $smokeRoot "fonts"
          & $gui --self-test | Tee-Object -FilePath (Join-Path $smokeRoot "gui-self-test.json")
          & $agent diagnostics | Tee-Object -FilePath (Join-Path $smokeRoot "diagnostics.json")
          & $agent doctor | Tee-Object -FilePath (Join-Path $smokeRoot "doctor.json")
          & $agent validation-report | Tee-Object -FilePath (Join-Path $smokeRoot "validation-report.json")
          & $agent validation-report --write | Tee-Object -FilePath (Join-Path $smokeRoot "validation-report-file.json")
          & $agent repair-managed | Tee-Object -FilePath (Join-Path $smokeRoot "repair-managed.json")
          & $agent install-validation-font | Tee-Object -FilePath (Join-Path $smokeRoot "install-validation-font.json")
          & $agent scan | Tee-Object -FilePath (Join-Path $smokeRoot "scan-after-validation-font.json")
          $diagnostics = Get-Content (Join-Path $smokeRoot "diagnostics.json") -Raw
          $guiSelfTest = Get-Content (Join-Path $smokeRoot "gui-self-test.json") -Raw
          $doctor = Get-Content (Join-Path $smokeRoot "doctor.json") -Raw
          $validationReport = Get-Content (Join-Path $smokeRoot "validation-report.json") -Raw
          $validationReportFile = Get-Content (Join-Path $smokeRoot "validation-report-file.json") -Raw
          $repairManaged = Get-Content (Join-Path $smokeRoot "repair-managed.json") -Raw
          $installValidationFont = Get-Content (Join-Path $smokeRoot "install-validation-font.json") -Raw
          $scanAfterValidationFont = Get-Content (Join-Path $smokeRoot "scan-after-validation-font.json") -Raw
          if (-not $guiSelfTest.Contains('"ok": true')) { throw "GUI self-test did not report ok" }
          if (-not $guiSelfTest.Contains('"Native GUI state initialized')) { throw "GUI self-test message missing" }
          $guiSelfTestJson = $guiSelfTest | ConvertFrom-Json
          if ($guiSelfTestJson.ok -ne $true) { throw "GUI self-test JSON did not report ok" }
          if ($guiSelfTestJson.platform -ne "windows") { throw "GUI self-test platform was not windows" }
          if ($null -eq $guiSelfTestJson.first_run_steps) { throw "GUI self-test first-run steps were missing" }
          $firstRunSteps = @($guiSelfTestJson.first_run_steps)
          if (-not ($firstRunSteps | Where-Object { $_.Contains("Install Validation Font") })) { throw "GUI first-run steps omitted validation font guidance" }
          if (-not ($firstRunSteps | Where-Object { $_.Contains("Share Fonts On This Network") })) { throw "GUI first-run steps omitted LAN sharing guidance" }
          if (-not ($firstRunSteps | Where-Object { $_.Contains("Preview From Peer") })) { throw "GUI first-run steps omitted preview guidance" }
          if ($null -eq $guiSelfTestJson.lan_readiness) { throw "GUI self-test LAN readiness lines were missing" }
          $lanReadiness = @($guiSelfTestJson.lan_readiness)
          if (-not ($lanReadiness | Where-Object { $_.Contains("Sharing: off") })) { throw "GUI LAN readiness omitted sharing-off state" }
          if (-not ($lanReadiness | Where-Object { $_.Contains("no port forwarding") })) { throw "GUI LAN readiness omitted no-port-forwarding state" }
          if (-not ($lanReadiness | Where-Object { $_.Contains("Saved peers: none yet") })) { throw "GUI LAN readiness omitted saved-peer state" }
          if (-not ($lanReadiness | Where-Object { $_.Contains("Automation: available after saving a peer") })) { throw "GUI LAN readiness omitted automation gating state" }
          if ($guiSelfTestJson.saved_peer_count -ne 0) { throw "GUI self-test unexpectedly loaded saved peers" }
          if (-not $guiSelfTestJson.setup_phase.Contains("Pairing mode")) { throw "GUI self-test setup phase did not explain pairing mode" }
          if (-not $guiSelfTestJson.role_card_text.Contains("This computer")) { throw "GUI self-test role card omitted this-computer guidance" }
          if (-not $guiSelfTestJson.role_card_text.Contains("Other computer")) { throw "GUI self-test role card omitted other-computer guidance" }
          if (-not $guiSelfTestJson.pre_share_guidance.Contains("Receiving fonts from another computer does not require an inbound firewall prompt")) { throw "GUI pre-share guidance did not distinguish Windows client-only sync" }
          if (-not $guiSelfTestJson.lan_sharing_guidance.Contains("Windows Firewall")) { throw "GUI self-test omitted Windows firewall hosting guidance" }
          if (-not $guiSelfTestJson.lan_sharing_guidance.Contains("No port forwarding")) { throw "GUI self-test omitted no-port-forwarding guidance" }
          if (-not $guiSelfTestJson.manual_peer_fallback_guidance.Contains("Client-only sync should not need an inbound firewall prompt")) { throw "GUI self-test omitted Windows client-only firewall guidance" }
          if (-not $guiSelfTestJson.manual_peer_fallback_guidance.Contains("paste the sharing computer")) { throw "GUI self-test omitted manual peer URL fallback guidance" }
          $matrixNames = @($guiSelfTestJson.sync_validation_matrix | ForEach-Object { $_.name })
          if (-not ($matrixNames -contains "macOS to Windows")) { throw "GUI self-test macOS-to-Windows matrix row missing" }
          if (-not ($matrixNames -contains "Windows to macOS")) { throw "GUI self-test Windows-to-macOS matrix row missing" }
          if (-not $guiSelfTestJson.validation_checklist_text.Contains("SyncMyFonts LAN MVP validation")) { throw "GUI self-test validation checklist missing" }
          if (-not $guiSelfTestJson.validation_checklist_text.Contains("system fonts were not offered")) { throw "GUI self-test system-font validation note missing" }
          if (-not $diagnostics.Contains('"support_report_text"')) { throw "Diagnostics support report missing" }
          if (-not $diagnostics.Contains('"log_dir"')) { throw "Diagnostics log dir missing" }
          if (-not $doctor.Contains('"checks"')) { throw "Doctor checks missing" }
          if (-not $doctor.Contains('"saved-peers"')) { throw "Doctor saved peer check missing" }
          if (-not $validationReport.Contains('"registration_issues"')) { throw "Validation report registration issues missing" }
          if (-not $validationReport.Contains('"manual_validation_steps"')) { throw "Validation report manual steps missing" }
          if (-not $validationReport.Contains('"sync_validation_matrix"')) { throw "Validation report sync validation matrix missing" }
          if (-not $validationReport.Contains("macOS to Windows")) { throw "Validation report macOS-to-Windows matrix row missing" }
          if (-not $validationReport.Contains("Windows to macOS")) { throw "Validation report Windows-to-macOS matrix row missing" }
          if (-not $validationReport.Contains('"pass_criteria"')) { throw "Validation report pass criteria missing" }
          if (-not $validationReportFile.Contains('"path"')) { throw "Validation report file path missing" }
          if (-not $repairManaged.Contains('"repaired"')) { throw "Repair managed report repaired list missing" }
          if (-not $repairManaged.Contains('"failed"')) { throw "Repair managed report failed list missing" }
          if (-not $installValidationFont.Contains('"file_name": "SyncMyFontsValidation-Basic-Regular.ttf"')) { throw "Validation font install did not report the expected file name" }
          if (-not $scanAfterValidationFont.Contains('"SyncMyFontsValidation-Basic-Regular.ttf"')) { throw "Validation font was not visible to normal scan" }
          $scanAfterValidationFontJson = $scanAfterValidationFont | ConvertFrom-Json
          if ($scanAfterValidationFontJson.schema -ne 1) { throw "Scan JSON schema was not 1" }
          if ($scanAfterValidationFontJson.platform -ne "windows") { throw "Scan JSON platform was not windows" }
          if ($null -eq $scanAfterValidationFontJson.fonts) { throw "Scan JSON fonts field was missing" }
          if ($null -eq $scanAfterValidationFontJson.warnings) { throw "Scan JSON warnings field was missing" }
          $validationScanFont = @($scanAfterValidationFontJson.fonts) | Where-Object { $_.file_name -eq "SyncMyFontsValidation-Basic-Regular.ttf" } | Select-Object -First 1
          if (-not $validationScanFont) { throw "Scan JSON did not include the validation font" }
          if ($validationScanFont.format -notin @("ttf", "otf")) { throw "Validation font scan format was unexpected: $($validationScanFont.format)" }
          if (-not $validationScanFont.content_sha256) { throw "Validation font scan hash was missing" }
          if (-not (Get-ChildItem (Join-Path $smokeRoot "logs") -Filter "validation-report-*.json" -ErrorAction SilentlyContinue)) { throw "Validation report file was not saved" }
          $env:APPDATA = Join-Path $smokeRoot "appdata"
          & $agent install-app-shortcuts | Tee-Object -FilePath (Join-Path $smokeRoot "app-shortcuts.json")
          $shortcutsDir = Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs\SyncMyFonts"
          $expectedShortcuts = @(
            "SyncMyFonts.cmd",
            "Sync Saved Peers.cmd",
            "Preview Saved Peers.cmd",
            "Diagnostics.cmd",
            "Readiness Check.cmd"
          )
          foreach ($shortcut in $expectedShortcuts) {
            $shortcutPath = Join-Path $shortcutsDir $shortcut
            if (-not (Test-Path $shortcutPath)) { throw "Missing Start Menu shortcut: $shortcut" }
          }
          $syncShortcut = Get-Content (Join-Path $shortcutsDir "Sync Saved Peers.cmd") -Raw
          $previewShortcut = Get-Content (Join-Path $shortcutsDir "Preview Saved Peers.cmd") -Raw
          $diagnosticsShortcut = Get-Content (Join-Path $shortcutsDir "Diagnostics.cmd") -Raw
          $doctorShortcut = Get-Content (Join-Path $shortcutsDir "Readiness Check.cmd") -Raw
          if (-not $syncShortcut.Contains('"lan-sync-all"')) { throw "Sync shortcut does not run lan-sync-all" }
          if (-not $previewShortcut.Contains('"--dry-run"')) { throw "Preview shortcut does not dry run" }
          if (-not $diagnosticsShortcut.Contains('"diagnostics"')) { throw "Diagnostics shortcut command missing" }
          if (-not $doctorShortcut.Contains('"doctor"')) { throw "Readiness shortcut command missing" }
          if ($syncShortcut.Contains("SYNCMYFONTS_LAN_KEY") -or $syncShortcut.Contains("--lan-key")) { throw "Sync shortcut embeds LAN key material" }
          $sourceFonts = Join-Path $smokeRoot "source-fonts"
          $sourceConfig = Join-Path $smokeRoot "source-config"
          $targetFonts = Join-Path $smokeRoot "target-fonts"
          $targetConfig = Join-Path $smokeRoot "target-config"
          New-Item -ItemType Directory -Force -Path $sourceFonts, $sourceConfig, $targetFonts, $targetConfig | Out-Null
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/google/fonts/main/ofl/basic/Basic-Regular.ttf" -OutFile (Join-Path $sourceFonts "PackagedSmoke.ttf")
          $serveEnv = @{
            SYNCMYFONTS_CONFIG_DIR = $sourceConfig
            SYNCMYFONTS_LOG_DIR = Join-Path $smokeRoot "source-logs"
            SYNCMYFONTS_USER_FONT_DIR = $sourceFonts
          }
          $portListener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Parse("127.0.0.1"), 0)
          $portListener.Start()
          $smokePort = $portListener.LocalEndpoint.Port
          $portListener.Stop()
          $serve = Start-Process -FilePath $agent -ArgumentList @("lan-serve", "--listen", "127.0.0.1:$smokePort", "--pairing-code", "12345678") -Environment $serveEnv -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 60; $attempt++) {
              try {
                Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:$smokePort/health" | Out-Null
                $ready = $true
                break
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $ready) { throw "Packaged LAN server did not become ready" }
            $env:SYNCMYFONTS_CONFIG_DIR = $targetConfig
            $env:SYNCMYFONTS_LOG_DIR = Join-Path $smokeRoot "target-logs"
            $env:SYNCMYFONTS_USER_FONT_DIR = $targetFonts
            Remove-Item Env:SYNCMYFONTS_SKIP_PLATFORM_FONT_REGISTRATION -ErrorAction SilentlyContinue
            & $agent lan-pair --name "Packaged Peer" --url "http://127.0.0.1:$smokePort" --pairing-code "12345678" | Tee-Object -FilePath (Join-Path $smokeRoot "lan-pair.json")
            $lanPair = Get-Content (Join-Path $smokeRoot "lan-pair.json") -Raw
            if (-not $lanPair.Contains('"has_lan_key"')) { throw "Packaged LAN pair did not report saved key state" }
            & $agent lan-sync-all | Tee-Object -FilePath (Join-Path $smokeRoot "lan-sync.json")
            $lanSync = Get-Content (Join-Path $smokeRoot "lan-sync.json") -Raw
            if (-not $lanSync.Contains('"ok": true')) { throw "Packaged LAN sync did not report success" }
            if (-not (Test-Path (Join-Path $targetFonts "PackagedSmoke.ttf"))) { throw "Packaged LAN sync did not install the font" }
            & $agent verify-managed | Tee-Object -FilePath (Join-Path $smokeRoot "verify-managed-after-sync.json")
            $verifyManagedAfterSync = Get-Content (Join-Path $smokeRoot "verify-managed-after-sync.json") -Raw
            if (-not $verifyManagedAfterSync.Contains('"registration_issues": []')) { throw "Managed font registration verification was not clean after sync" }
            reg query "HKCU\Software\Microsoft\Windows NT\CurrentVersion\Fonts" /v "PackagedSmoke (SyncMyFonts)" | Tee-Object -FilePath (Join-Path $smokeRoot "font-registry.txt")
            $fontRegistry = Get-Content (Join-Path $smokeRoot "font-registry.txt") -Raw
            if (-not $fontRegistry.Contains((Join-Path $targetFonts "PackagedSmoke.ttf"))) { throw "Windows font registry did not point at synced smoke font" }
          } finally {
            if ($serve -and -not $serve.HasExited) {
              Stop-Process -Id $serve.Id -Force
            }
          }

      - name: Upload Windows archive
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: syncmyfonts-windows
          path: dist/syncmyfonts-windows-*.zip
          if-no-files-found: error
